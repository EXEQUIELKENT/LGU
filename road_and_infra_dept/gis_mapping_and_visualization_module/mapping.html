<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LGU Road Damage Map</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      body {
        margin: 0;
        height: 100vh;
      }

      #map {
        width: 50%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
      // Initialize map (Batangas sample coords)
      const map = L.map("map").setView([13.7563, 121.0583], 13);

      // OpenStreetMap tiles
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
      }).addTo(map);

      // Sample damage marker
      const marker = L.marker([13.7563, 121.0583]).addTo(map);

      marker.bindPopup(`
      <strong>Road Damage Report</strong><br>
      Type: Pothole<br>
      Severity: High
    `);
    </script>
  </body>
</html>
