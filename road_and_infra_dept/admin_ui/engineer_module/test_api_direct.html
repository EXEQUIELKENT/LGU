<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>API Direct Test</h1>
    
    <h2>Test get_inspections.php (with auth)</h2>
    <button onclick="testWithAuth()">Test With Auth</button>
    <div id="result1"></div>
    
    <h2>Test get_inspections_no_auth.php (without auth)</h2>
    <button onclick="testNoAuth()">Test Without Auth</button>
    <div id="result2"></div>
    
    <h2>Test get_repair_tasks.php</h2>
    <button onclick="testRepairTasks()">Test Repair Tasks</button>
    <div id="result3"></div>

    <script>
        async function testWithAuth() {
            const resultDiv = document.getElementById('result1');
            resultDiv.innerHTML = '<p>Loading...</p>';
            
            try {
                const response = await fetch('api/get_inspections.php');
                const data = await response.text();
                
                resultDiv.innerHTML = `
                    <h3>Response Status: ${response.status}</h3>
                    <h4>Response Headers:</h4>
                    <pre>${JSON.stringify([...response.headers.entries()], null, 2)}</pre>
                    <h4>Response Body:</h4>
                    <pre>${data}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        async function testNoAuth() {
            const resultDiv = document.getElementById('result2');
            resultDiv.innerHTML = '<p>Loading...</p>';
            
            try {
                const response = await fetch('api/get_inspections_no_auth.php');
                const data = await response.text();
                
                resultDiv.innerHTML = `
                    <h3>Response Status: ${response.status}</h3>
                    <h4>Response Headers:</h4>
                    <pre>${JSON.stringify([...response.headers.entries()], null, 2)}</pre>
                    <h4>Response Body:</h4>
                    <pre>${data}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        async function testRepairTasks() {
            const resultDiv = document.getElementById('result3');
            resultDiv.innerHTML = '<p>Loading...</p>';
            
            try {
                const response = await fetch('api/get_repair_tasks.php');
                const data = await response.text();
                
                resultDiv.innerHTML = `
                    <h3>Response Status: ${response.status}</h3>
                    <h4>Response Headers:</h4>
                    <pre>${JSON.stringify([...response.headers.entries()], null, 2)}</pre>
                    <h4>Response Body:</h4>
                    <pre>${data}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
