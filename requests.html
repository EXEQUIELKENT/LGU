<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infrastructure Repair Requests</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* BACKGROUND */
body {
    height: 100vh;
    background: url("cityhall.jpeg") center/cover no-repeat fixed;
    position: relative;
    overflow: hidden;
}

body::before {
    content: "";
    position: absolute;
    inset: 0;
    backdrop-filter: blur(6px);
    background: rgba(0,0,0,0.35);
    z-index: 0;
}

/* Sidebar Navigation */
.sidebar-nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 250px;
    height: 100vh;
    background: rgba(255, 255, 255, 0.795);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.25);  /* glowing border */
    box-shadow: 0 4px 25px rgba(0,0,0,0.25);
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 0;
    z-index: 1000;
}

/* Top area: logo + nav links */
.sidebar-top {
    display: flex;
    flex-direction: column;
    flex-grow: 1;
    padding: 20px 0;
    overflow-y: auto;
}

/* LGU Logo */
.sidebar-nav .site-logo {
    margin-top: 5px;
    flex-direction: column;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding-bottom: 5px;
    width: calc(100% - 50px);
    margin-left: 25px;
    margin-right: 25px;
    box-sizing: border-box;
    margin-bottom: 20px;
    color: #fff;
}

.sidebar-nav .site-logo img {
    width: 120px;
    height: auto;
    object-fit: contain;
    border-radius: 10px;
}

/* Navigation Links */
.sidebar-nav .nav-list {
    list-style: none;
    font-size: 14px;
    padding: 0 20px;
    margin: 0;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
}

.sidebar-nav .nav-list li {
    width: 100%;
    margin: 3px 0;
}

.sidebar-nav .nav-link {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #000000;
    text-decoration: none;
    padding: 12px 20px;
    transition: all 0.3s ease;
    border-radius: 8px;
}

.sidebar-nav .nav-link.active,
.sidebar-nav .nav-link.active:hover {
    background: #3762c8; /* slightly lighter */
    color: #fff;
    transform: translateX(2px);
}

.sidebar-nav .nav-link:hover {
    background: #97a4c2; /* slightly lighter */
    transform: translateX(8px) scale(1.02);
}

/* Divider */
.sidebar-divider {
    border-bottom: 2px solid rgba(0, 0, 0, 0.551);
    width: calc(100% - 50px);
    margin: 20px 25px 0 25px;
}

/* User info at bottom */
.sidebar-nav .user-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    border-top: 1px solid rgba(255,255,255,0.2);
}

.sidebar-nav .user-welcome,
.sidebar-nav .user-rights {
    text-align: center;
    color: #000000;
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 5px;
}

.sidebar-nav .logout-btn {
    background: #3762c8; /* slightly lighter */
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s ease;
}

.sidebar-nav .logout-btn:hover {
    background: #3762c8; /* slightly lighter */
    color: #fff;
    transform: translateY(-2px) scale(1.02);
}

/* ================= MAIN CONTENT ================= */
.main-content {
    margin-left: 250px;
    padding: 60px 80px;
    position: relative;
    z-index: 1;
}

.page-title {
    color: #fff;
    font-size: 28px;
    margin-bottom: 25px;
}

/* CARD */
.table-card {
    background: rgba(255,255,255,0.9);
    border-radius: 22px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

/* TABLE */
table {
    width: 100%;
    border-collapse: separate; /* IMPORTANT */
    border-spacing: 0;
}

thead {
    background: #3762c8;
    color: #fff;
}

thead th {
    padding: 14px;
    font-size: 14px;
    text-align: left;
}

/* Rounded corners for TH */
thead th:first-child {
    border-top-left-radius: 12px;
}

thead th:last-child {
    border-top-right-radius: 12px;
}

th, td {
    padding: 14px;
    font-size: 14px;
    text-align: left;
}

tbody tr {
    border-bottom: 1px solid rgba(0,0,0,0.1);
}

tbody tr:hover {
    background: rgba(55,98,200,0.08);
}

/* STATUS */
.status {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
}

.pending { background: #ffe082; color: #6b5500; }
.in-progress { background: #90caf9; color: #0d47a1; }
.completed { background: #a5d6a7; color: #1b5e20; }

/* ACTION */
.btn-view {
    background: #3762c8;
    color: #fff;
    border: none;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
}

/* EVIDENCE */
.evidence-box {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.evidence-preview {
    width: 70px;
    height: 70px;
    border-radius: 10px;
    background: rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #555;
}

.upload-btn {
    background: #3762c8;
    color: #fff;
    padding: 5px 12px;
    font-size: 11px;
    border-radius: 6px;
    cursor: pointer;
    width: fit-content;
}
</style>
</head>

<body>

<div class="sidebar-nav">
    <div class="sidebar-top">
        <div class="site-logo">
            <img src="logocityhall.png" alt="LGU Logo">
    <div class="sidebar-divider"></div>
        </div>
        <ul class="nav-list">
            <li><a href="employee.html" class="nav-link">Dashboard</a></li>
            <li><a href="requests.html" class="nav-link active">Requests</a></li>
            <li><a href="reports.html" class="nav-link">Reports</a></li>
            <li><a href="sched.html" class="nav-link">Schedule</a></li>
        </ul>
    </div>

    <div class="sidebar-divider"></div>

    <div class="user-info">
        <div class="user-welcome">Welcome, Kent</div>
        <button class="logout-btn">Logout</button>
    </div>
</div>

<!-- CONTENT -->
<div class="main-content">
    <h2 class="page-title">Infrastructure Repair Requests</h2>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Request ID</th>
                    <th>Infrastructure</th>
                    <th>Location</th>
                    <th>Issue</th>
                    <th>Date Submitted</th>
                    <th>Evidence</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>#REQ-001</td>
                    <td>Road</td>
                    <td>Barangay San Juan</td>
                    <td>Potholes</td>
                    <td>2025-04-10</td>
                    <td>
                        <div class="evidence-box">
                            <div class="evidence-preview">No image</div>
                        </div>
                    </td>
                    <td><span class="status pending">Pending</span></td>
                    <td><button class="btn-view">View</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
