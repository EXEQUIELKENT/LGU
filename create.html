<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account | LGU Portal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="nav">
    <div class="nav-logo">🏛️ LGU Portal</div>
    <div class="nav-links">
        <a href="login.html">Login</a>
        <a class="active">Create Account</a>
    </div>
</header>

<div class="wrapper">
    <div class="card">

        <img src="shield.jpg" class="icon-top">

        <h2 class="title">Create Account</h2>
        <p class="subtitle">Register to access the LGU maintenance system.</p>

        <form>

            <div class="input-box">
                <label>Full Name</label>
                <input type="text" placeholder="Juan Dela Cruz">
                <span class="icon">👤</span>
            </div>

            <div class="input-box">
                <label>Email Address</label>
                <input type="email" placeholder="name@lgu.gov.ph">
                <span class="icon">📧</span>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" placeholder="••••••••">
                <span class="icon">🔒</span>
            </div>

            <div class="input-box">
                <label>Confirm Password</label>
                <input type="password" placeholder="••••••••">
                <span class="icon">🔒</span>
            </div>

            <button class="btn-primary">Create Account</button>

            <p class="small-text">
                Already registered?
                <a href="login.html" class="link">Sign In</a>
            </p>

        </form>
    </div>
</div>

</body>
</html>
